name: release-app

# Builds the app/ workspace as a multi-arch Docker image and pushes it to
# ghcr.io/${{ github.repository_owner }}/ai-relay.
#
# Triggers:
#   - push of any `v*` tag (e.g. v0.2.0, v0.2.0-rc.0) — produces a versioned tag
#     and updates `latest` if pushed from the default branch
#   - manual dispatch — useful for first-time setup verification
#
# First-time maintainer setup (one-time, post-merge):
#   1. Settings → Actions → General → Workflow permissions:
#      "Read and write permissions" + allow PR creation/approval
#   2. After the first successful run: Settings → Packages → ai-relay →
#      Change visibility (default is private; set to public if desired)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ai-relay
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
