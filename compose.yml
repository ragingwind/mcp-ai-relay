# Production / quick-try compose file.
# Pulls the published multi-arch image from ghcr.
# For local development builds, use compose.dev.yml instead:
#   docker compose -f compose.dev.yml up --build
#
# Healthcheck is inherited from the Dockerfile HEALTHCHECK directive.

services:
  relay:
    image: ghcr.io/ragingwind/ai-relay:latest
    ports:
      - "${HOST_PORT:-8787}:8787"
    env_file:
      - .env.local
    restart: unless-stopped
